name: Notebook integration tests

# Runs the docs/ notebooks as integration tests. Kept separate from the unit
# tests so it can be (a) run on demand and (b) non-blocking — several notebooks
# hit external services (public buckets, Hugging Face, PyPI/GitHub) that can be
# flaky, and that should never block a merge. docs/conftest.py skips any notebook
# whose data/credentials are absent.
#
# These notebooks are expensive, so they do NOT run on every push. Instead they
# run once each time the `integration-tests` label is added to a PR (the label is
# then removed automatically so it can be re-added to re-run), and on manual
# dispatch via the Actions "Run workflow" button.
on:
  pull_request:
    types: [labeled]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  test-notebooks:
    name: Run notebook integration tests
    runs-on: ubuntu-latest
    # Run on manual dispatch, or when the `integration-tests` label is added to a PR.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.label.name == 'integration-tests'
    # Non-blocking: a failure here (e.g. a flaky external service) must not fail
    # the workflow run or block PR merges.
    continue-on-error: true
    steps:
      - name: Checkout (LFS smudge deferred)
        uses: actions/checkout@v4
        with:
          lfs: false

      # Cache the Git LFS objects keyed on their content ids, so the heavy
      # example rasters (e.g. the ~158 MB Proba-V product) are pulled from
      # GitHub LFS only when they change — not on every run. This keeps us
      # within the LFS bandwidth quota.
      - name: Build LFS cache key
        run: git lfs ls-files --long | cut -d' ' -f1 | sort > .lfs-assets-id

      - name: Cache LFS objects
        uses: actions/cache@v4
        with:
          path: .git/lfs
          key: lfs-${{ hashFiles('.lfs-assets-id') }}
          restore-keys: lfs-

      - name: Fetch LFS data
        run: git lfs pull

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install dependencies
        run: poetry install --with dev,tutorial

      - name: Register Jupyter kernel
        run: poetry run python -m ipykernel install --user --name georeader --display-name "Python (georeader)"

      # Notebooks whose data/credentials are absent are skipped by
      # docs/conftest.py; the LFS-backed ones (Proba-V + Sentinel-2, AVIRIS) and
      # the public-network ones run. To also run the credentialed notebooks, wire
      # the relevant secrets here as env vars (see examples/README.md).
      - name: Run notebook integration tests
        # All credentials are repo *secrets* (masked in logs, not exposed in this
        # public repo). Configure the ones you have to run the corresponding
        # gated notebooks; the rest are skipped by docs/conftest.py.
        env:
          # Azure (PRISMA / EnMAP)
          SAS_TOKEN: ${{ secrets.SAS_TOKEN }}
          AZURE_STORAGE_ACCOUNT: ${{ secrets.AZURE_STORAGE_ACCOUNT }}
          CONTAINER_NAME: ${{ secrets.CONTAINER_NAME }}
          # NASA Earthdata (EMIT)
          EARTHDATA_TOKEN: ${{ secrets.EARTHDATA_TOKEN }}
          # Carbon Mapper — email+password preferred (tokens are
          # short-lived JWTs and expire as repo secrets; the config
          # layer refreshes from credentials).
          CARBONMAPPER_TOKEN: ${{ secrets.CARBONMAPPER_TOKEN }}
          CARBONMAPPER_EMAIL: ${{ secrets.CARBONMAPPER_EMAIL }}
          CARBONMAPPER_PASSWORD: ${{ secrets.CARBONMAPPER_PASSWORD }}
          # Earth Engine: service-account key (raw JSON); no Cloud project needed
          EARTHENGINE_SERVICE_ACCOUNT_KEY: ${{ secrets.EARTHENGINE_SERVICE_ACCOUNT_KEY }}
        run: poetry run pytest --nbmake docs/ -v --nbmake-timeout=600 --nbmake-kernel=georeader

      # Remove the label again so re-adding it re-triggers the suite (like marsml).
      # Skipped on manual dispatch (no PR number).
      - name: Remove integration-tests label
        if: ${{ always() && github.event_name == 'pull_request' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr edit ${{ github.event.pull_request.number }} \
            --remove-label "integration-tests" -R ${{ github.repository }} \
            || echo "Label 'integration-tests' not present"
