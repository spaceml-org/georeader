site_name: georeader
repo_url: https://github.com/spaceml-org/georeader
site_url: https://spaceml-org.github.io/georeader
site_description: 🛰️ Process raster data in python
site_author: Gonzalo Mateo-García
edit_uri: edit/main/docs/
repo_name: spaceml-org/georeader

nav:
  - Home: index.md
  - GeoReader concepts and protocols: modules/read_module.md
  - Modules:
    - reflectance: modules/reflectance_module.md
    - GeoTensor: modules/geotensor_module.md
    - RasterioReader: modules/rasterio_reader.md
    - rasterize: modules/rasterize_module.md
    - vectorize: modules/vectorize_module.md
    - ee_image: modules/ee_image.md
    - readers: modules/readers_module.md
  - Advanced modules:
    - save: advanced_modules/save_module.md
    - plot: advanced_modules/plot_module.md
    - mosaic: advanced_modules/mosaic_module.md
    - slices: advanced_modules/slices_module.md
    - griddata: advanced_modules/griddata_module.md
  - Tutorials:
    - Read overlapping rasters:
        - Overlapping S2 and Proba-V: read_overlapping_probav_and_sentinel2.ipynb
        - Overlapping S2 and AVIRIS: reading_overlapping_sentinel2_aviris.ipynb
    - GeoTensor numpy API: geotensor_numpy_api.ipynb
    - Tile and stitch AI predictions: advanced/tiling_and_stitching.ipynb
    - Sentinel-2:
      - From Google Earth Engine: Sentinel-2/run_in_gee_image.ipynb
      - From the public bucket: read_S2_SAFE_from_bucket.ipynb
      - Metadata: Sentinel-2/explore_metadata_s2.ipynb
      - Mosaic: Sentinel-2/query_mosaic_s2_images.ipynb
      - Mosaic from GEE: Sentinel-2/s2_mosaic_from_gee.ipynb
      - ToA reflectance to radiance: Sentinel-2/convert_to_radiance.ipynb
    - Hyperspectral sensors:
      - EMIT: emit_explore.ipynb
      - PRISMA: simultaneous_prisma_emit.ipynb
      - EnMAP: enmap_with_cloudsen12.ipynb
      - PRISMA cloud detection: prisma_with_cloudsen12.ipynb
    - Carbon Mapper:
      - API + typed models: carbonmapper/api_explore.ipynb
      - Products (reference): carbonmapper/products_reference.ipynb
      - Products (quickstart): carbonmapper/products_quickstart.ipynb
      - Products (partner drop): carbonmapper/products_partner_drop.ipynb
    - Advanced:
      - VSIL cache problem: advanced/error_read_write_in_remote_path.md
plugins:
  - search
  # - social  # Disabled: requires mkdocs-material[imaging] with PIL and cairosvg
  - mkdocstrings:
      handlers:
        python:
          paths: [..]
  - mknotebooks:
      execute: false
      timeout: 100
      allow_errors: false
  
theme:
  name: material
  highlightjs: true # Enable syntax highlighting
  highlightjs_languages:
    - python
  logo: images/logo_georeader.png
  favicon: images/logo_georeader.png
  feature:
    tabs: true
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

extra_javascript:
  # Render <pre class="mermaid"> blocks emitted by the superfences
  # custom_fences config below. mkdocs-material 9.x doesn't auto-bundle
  # mermaid; pulling the UMD bundle from a CDN is the standard recipe.
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/spaceml-org/georeader
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/georeader-spaceml
  meta:
    - name: "og:title"
      content: "georeader"
    - name: "og:description"
      content: "🛰️ Process raster data in python"
    - name: "og:image"
      content: "https://spaceml-org.github.io/georeader/images/logo_georeader.png"
    - name: "og:url"
      content: "https://spaceml-org.github.io/georeader"

markdown_extensions:
  - pymdownx.highlight
  - pymdownx.inlinehilite
  # `pymdownx.extra` is a meta-bundle that re-loads `pymdownx.superfences`
  # without our `custom_fences` config — so we register superfences AFTER
  # extra so the mermaid fence format sticks.
  - pymdownx.extra
  - pymdownx.superfences:
      # Render ```mermaid blocks as <pre class="mermaid"> divs so the
      # mermaid.js bundle that ships with mkdocs-material picks them up.
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.details
  - pymdownx.tabbed
  - pymdownx.emoji
  - pymdownx.tasklist
  - pymdownx.tilde
  - codehilite
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
